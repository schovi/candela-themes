# Same gate the Cloudflare Pages build runs (validate + app build) — keep them in sync.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: Source JSON is valid
        run: python3 -m json.tool themes/candela-themes.json > /dev/null
      - name: Design invariants hold
        run: node scripts/validate.js
      - name: Explorer builds
        run: |
          cd app
          npm ci
          npm run build
