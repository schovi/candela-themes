# Cut a release entirely in CI. Dispatch this (GitHub UI or
# `gh workflow run release.yml -f bump=minor`) and CI validates, builds every
# package, and only then bumps the version, tags, and publishes the GitHub
# Release. A failed build never creates a tag. Main-only.
#
# Build order matters: bump the version FIRST so the generated artifacts carry
# the new version, then build, then tag/push/publish.
#
# Publishing to editor marketplaces is a separate, manually-gated workflow
# (publish-marketplaces.yml) — releasing never touches marketplace credentials.
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump for this release
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release only from main
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Release must run on main (got '$GITHUB_REF_NAME')." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # IntelliJ plugin build needs a JDK and Gradle on PATH.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.0.0'

      - name: Install locked dependencies
        run: npm ci

      - name: Source JSON is valid
        run: python3 -m json.tool themes/candela-themes.json > /dev/null

      - name: Design invariants hold
        run: node scripts/validate.js

      - name: Explorer builds
        run: |
          cd app
          npm ci
          npm run build

      # Bump first so generated manifests + artifact filenames carry the new
      # version. Creates the commit + tag locally; nothing is pushed yet.
      - name: Bump version and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.bump }}" -m "release: v%s [skip ci]"
          echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      # The build is the gate: if any package fails, the job stops here and the
      # tag never reaches the remote.
      - name: Build every package
        run: npm run package

      - name: All-formats archive + checksums
        run: npm run package:release

      - name: Push commit and tag
        run: git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" \
            --verify-tag \
            --generate-notes \
            --title "Candela Themes v${VERSION}" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/*.vsix \
            dist/*.sublime-package \
            dist/SHA256SUMS.txt

      # Zed and Sublime install from committed git contents, so the generated
      # layouts are republished + tagged in their own repos. Package Control picks
      # the new Sublime tag up automatically; Zed still needs a per-release PR to
      # zed-industries/extensions bumping the version (see docs/release-runbook.md).
      # Needs a cross-repo token; the default GITHUB_TOKEN can't push to other repos.
      - name: Sync Zed + Sublime extension repos
        env:
          DIST_PUSH_TOKEN: ${{ secrets.DIST_PUSH_TOKEN }}
        run: |
          if [ -z "$DIST_PUSH_TOKEN" ]; then
            echo "::warning::DIST_PUSH_TOKEN not set — skipping Zed/Sublime dist-repo sync."
            exit 0
          fi
          node scripts/publish-extension-repos.js
