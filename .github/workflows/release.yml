# Cut a GitHub Release from a vX.Y.Z tag: validate, build every package from a
# clean checkout, then upload the artifacts + checksums with generated notes.
# Publishing to editor marketplaces is a separate, manually-gated workflow
# (publish-marketplaces.yml) — a tag never touches marketplace credentials.
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # IntelliJ plugin build needs a JDK and Gradle 9 on PATH.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.0.0'

      - name: Install locked dependencies
        run: npm ci

      - name: Tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "v${version}" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${version}." >&2
            exit 1
          fi

      - name: Source JSON is valid
        run: python3 -m json.tool themes/candela-themes.json > /dev/null

      - name: Design invariants hold
        run: node scripts/validate.js

      - name: Explorer builds
        run: |
          cd app
          npm ci
          npm run build

      - name: Build every package
        run: npm run package

      - name: All-formats archive + checksums
        run: npm run package:release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            --title "Candela Themes $GITHUB_REF_NAME" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/*.vsix \
            dist/*.sublime-package \
            dist/SHA256SUMS.txt
