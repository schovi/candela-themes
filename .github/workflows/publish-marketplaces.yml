# Push an already-tagged release to the editor marketplaces that support a
# non-interactive publisher. Manual-dispatch only, and every job runs in the
# protected `marketplace` environment — so credentials are never reachable from
# ordinary PR/branch/tag CI, and a maintainer must approve each run.
#
# Dispatch this against the release tag itself, so github.ref IS the tag and the
# marketplace environment's `v*` tag policy actually gates the run:
#   gh workflow run publish-marketplaces.yml --ref vX.Y.Z -f vscode=true
#
# Zed and Sublime Package Control have no non-interactive publisher; their
# submissions/updates stay manual (see docs/release-runbook.md).
name: Publish to marketplaces

on:
  workflow_dispatch:
    inputs:
      vscode:
        description: Publish to VS Code Marketplace
        type: boolean
        default: false
      openvsx:
        description: Publish to Open VSX
        type: boolean
        default: false
      jetbrains:
        description: Publish to JetBrains Marketplace (plugin must already be approved)
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  vscode:
    if: ${{ inputs.vscode }}
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run package:vscode
      - name: vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: node_modules/.bin/vsce publish --packagePath "$(ls dist/candela-themes-*.vsix)"

  openvsx:
    if: ${{ inputs.openvsx }}
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run package:vscode
      - name: ovsx publish
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: node_modules/.bin/ovsx publish "$(ls dist/candela-themes-*.vsix)" -p "$OVSX_PAT"

  jetbrains:
    if: ${{ inputs.jetbrains }}
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          gradle-version: '9.0.0'
      - run: npm ci
      - run: npm run package:intellij
      - name: Upload update to JetBrains Marketplace
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
          JETBRAINS_PLUGIN_ID: ${{ secrets.JETBRAINS_PLUGIN_ID }}
        run: |
          curl -i --fail \
            -H "Authorization: Bearer $JETBRAINS_TOKEN" \
            -F pluginId="$JETBRAINS_PLUGIN_ID" \
            -F file=@"$(ls dist/candela-themes-intellij-*.zip)" \
            https://plugins.jetbrains.com/api/updates/upload
